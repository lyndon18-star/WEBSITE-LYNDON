<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | LAB U</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">LAB U</span>
        <span class="brand-name">Unified Storefront</span>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="dashboard.html">Orders</a>
      </nav>
      <div class="nav-tools">
        <form class="search-box" action="shop.html" method="get">
          <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M19 11a8 8 0 11-16 0 8 8 0 0116 0z"/></svg>
          <input type="text" name="search" placeholder="Search components..." aria-label="Search">
        </form>
        <div class="nav-tools-icons">
          <a class="nav-icon active" href="cart.html" title="Cart">
            <svg viewBox="0 0 24 24"><path d="M4 5h2l.7 3M7 13h10l1.8-7H6.2M7 13l-1.4 5M17 13l1.4 5M9 20a1 1 0 100 2 1 1 0 000-2zM15 20a1 1 0 100 2 1 1 0 000-2z"/></svg>
            <span class="nav-badge" data-cart-count>0</span>
          </a>
          <a class="nav-icon" href="login.html" title="Account">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="site-shell cart-wrap">
    <div class="forge-card fade-in">
      <div class="forge-section">
        <div class="forge-section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Shopping Cart Items
        </div>
        <div class="cart-container" id="cartView"></div>
      </div>
    </div>
  </main>

  <div class="cart-bottom-bar" style="background: rgba(15, 20, 34, 0.98); border-top: 1px solid rgba(255,255,255,0.08);">
    <div class="cart-bar-inner">
      <div class="cart-bar-left">
        <label class="forge-checkbox">
          <input type="checkbox" checked id="selectAllCart">
          <span class="forge-checkmark"></span>
          Select All
        </label>
        <span class="cart-coupons" style="background: rgba(33, 212, 253, 0.1); color: var(--accent);">Vouchers Applied</span>
      </div>
      <div class="cart-bar-right">
        <div class="cart-total-box">
          <span style="color: var(--muted); font-size: 0.85rem;">Total (Exc. Shipping)</span>
          <strong class="forge-red-price" id="cartTotalSum" style="font-size: 1.3rem;">PHP 0.00</strong>
        </div>
        <a href="checkout.html" class="btn btn-primary" style="padding: 12px 40px; border-radius: 8px;">Check out</a>
      </div>
    </div>
  </div>

  <footer class="footer-note">LAB U</footer>
  <script src="app.js"></script>
</body>
</html>
