<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders | LAB U</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">LAB U</span>
        <span class="brand-name">Unified Storefront</span>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a class="active" href="dashboard.html">Orders</a>
      </nav>
      <div class="nav-tools">
        <form class="search-box" action="shop.html" method="get">
          <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M19 11a8 8 0 11-16 0 8 8 0 0116 0z"/></svg>
          <input type="text" name="search" placeholder="Search components..." aria-label="Search">
        </form>
        <div class="nav-tools-icons">
          <a class="nav-icon" href="cart.html" title="Cart">
            <svg viewBox="0 0 24 24"><path d="M4 5h2l.7 3M7 13h10l1.8-7H6.2M7 13l-1.4 5M17 13l1.4 5M9 20a1 1 0 100 2 1 1 0 000-2zM15 20a1 1 0 100 2 1 1 0 000-2z"/></svg>
            <span class="nav-badge" data-cart-count>0</span>
          </a>
          <a class="nav-icon" href="login.html" title="Account">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="site-shell">
    <section class="section">
      <div class="page-hero-grid">
        <article class="panel page-hero-main">
          <p class="section-label">Customer Account</p>
          <h1 id="dashboardWelcome">Orders</h1>
          <p class="page-copy-tight">Track each order from placement to delivery.</p>
          <div class="hero-actions compact-actions">
            <a class="btn btn-primary" href="shop.html">Shop</a>
            <a class="btn btn-secondary" href="cart.html">Cart</a>
          </div>
        </article>

        <aside class="panel page-hero-side">
          <p class="section-label">Status</p>
          <div class="admin-overview customer-overview">
            <article class="mini-stat">
              <span>Total orders</span>
              <strong id="dashboardOrderCount">0</strong>
            </article>
            <article class="mini-stat">
              <span>Cart items</span>
              <strong id="dashboardCartCount">0</strong>
            </article>
            <article class="mini-stat">
              <span>In transit</span>
              <strong id="dashboardTransitCount">0</strong>
            </article>
            <article class="mini-stat">
              <span>Delivered</span>
              <strong id="dashboardDeliveredCount">0</strong>
            </article>
          </div>
        </aside>
      </div>
    </section>

    <section class="section dashboard-wrap">
      <section class="dashboard-panel">
        <p class="section-label">Order Tracking</p>
        <h2>My Orders</h2>
        <div id="orders" class="builder-list"></div>
      </section>
    </section>
  </main>

  <footer class="footer-note">LAB U</footer>
  <script src="app.js"></script>
</body>
</html>
