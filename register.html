<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | LAB U</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">LAB U</span>
        <span class="brand-name">Unified Storefront</span>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="dashboard.html">Orders</a>
      </nav>
      <div class="nav-tools">
        <form class="search-box" action="shop.html" method="get">
          <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M19 11a8 8 0 11-16 0 8 8 0 0116 0z"/></svg>
          <input type="text" name="search" placeholder="Search components..." aria-label="Search">
        </form>
        <div class="nav-tools-icons">
          <a class="nav-icon" href="cart.html" title="Cart">
            <svg viewBox="0 0 24 24"><path d="M4 5h2l.7 3M7 13h10l1.8-7H6.2M7 13l-1.4 5M17 13l1.4 5M9 20a1 1 0 100 2 1 1 0 000-2zM15 20a1 1 0 100 2 1 1 0 000-2z"/></svg>
            <span class="nav-badge" data-cart-count>0</span>
          </a>
          <a class="nav-icon" href="login.html" title="Account">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="site-shell auth-wrap">
    <div class="auth-layout">
      <aside class="auth-panel auth-aside auth-aside-compact">
        <div>
          <p class="section-label">Create Account</p>
          <h1>Join LAB U</h1>
          <p class="page-copy-tight">Create a customer account to track orders and continue shopping later.</p>
        </div>
        <div class="mini-stat-grid">
          <article class="mini-stat">
            <span>Orders</span>
            <strong>Track delivery</strong>
          </article>
          <article class="mini-stat">
            <span>Catalog</span>
            <strong>Shop anytime</strong>
          </article>
        </div>
      </aside>

      <section class="auth-panel">
        <p class="section-label">Register</p>
        <h2>Create account</h2>
        <p class="page-copy-tight">Customer registration only.</p>

        <form onsubmit="event.preventDefault(); register();">
          <label class="form-field">
            <span>Full Name</span>
            <input id="name" placeholder="Your full name" type="text" required>
          </label>
          <label class="form-field">
            <span>Email Address</span>
            <input id="email" placeholder="you@example.com" type="email" required>
          </label>
          <label class="form-field">
            <span>Password</span>
            <input id="pass" placeholder="Create a password" type="password" required>
          </label>
          <label class="form-field">
            <span>Confirm Password</span>
            <input id="confirmPass" placeholder="Repeat password" type="password" required>
          </label>
          <button type="submit">Register</button>
        </form>

        <div class="auth-footer">
          Already registered? <a href="login.html">Login here</a>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer-note">LAB U</footer>
  <script src="app.js"></script>
</body>
</html>
